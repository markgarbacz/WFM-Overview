<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fourth iQ Manager App</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
.back-link { position: fixed; top: 20px; left: 20px; color: #0C4A7D; text-decoration: none; font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 6px; opacity: 0.9; transition: opacity 0.3s; z-index: 1000; }
.back-link:hover { opacity: 1; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #F5F5F5;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
  overflow: hidden;
}
.ipad-frame {
  width: 1080px;
  max-width: 100%;
  height: 780px;
  max-height: calc(100vh - 40px);
  background: #000;
  border-radius: 36px;
  padding: 16px;
  box-shadow: 
    0 0 0 2px #333,
    0 0 0 4px #1a1a1a,
    0 20px 60px rgba(0,0,0,0.5),
    0 0 120px rgba(26,26,46,0.3);
  position: relative;
}
.ipad-frame::before {
  content: '';
  position: absolute;
  top: 50%;
  right: 6px;
  transform: translateY(-50%);
  width: 3px;
  height: 40px;
  background: #222;
  border-radius: 2px;
}
.ipad-screen {
  width: 100%;
  height: 100%;
  border-radius: 20px;
  overflow: hidden;
  background: #fff;
  position: relative;
  transform: translateZ(0);
}
#root {
  width: 100%;
  height: 100%;
  overflow: auto;
  position: relative;
}
.ipad-camera {
  position: absolute;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  width: 8px;
  height: 8px;
  background: #001C36;
  border-radius: 50%;
  z-index: 9999;
  border: 1px solid #333;
}
/* Tablet / iPad — remove the frame, go full screen */
@media (max-width: 1400px), (hover: none) and (pointer: coarse) {
  body { padding: 0; background: #fff; }
  .ipad-frame {
    width: 100%;
    height: 100vh;
    max-height: 100vh;
    background: none;
    border-radius: 0;
    padding: 0;
    box-shadow: none;
  }
  .ipad-frame::before { display: none; }
  .ipad-screen { border-radius: 0; }
  .ipad-camera { display: none; }
}
</style>
