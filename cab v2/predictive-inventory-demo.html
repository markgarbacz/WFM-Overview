<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictive Inventory - Presentation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F5F5F5;
            overflow: hidden;
        }

        .back-button {
            position: fixed;
            top: 15px;
            left: 15px;
            background: linear-gradient(135deg, #0C4A7D, #00B69F);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1000;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 182, 159, 0.3);
        }

        .back-button:active {
            transform: translateY(0);
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F5F5F5;
            padding: 40px;
        }

        .slide-image {
            max-width: 90%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }

        .nav-controls {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 999;
            pointer-events: none;
        }

        .nav-button {
            width: 70px;
            height: 70px;
            border: none;
            background: rgba(0, 182, 159, 0.85);
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-weight: bold;
            pointer-events: all;
            box-shadow: 0 4px 20px rgba(0, 182, 159, 0.3);
        }

        .nav-button:hover {
            background: rgba(0, 182, 159, 1);
            transform: scale(1.1);
            box-shadow: 0 8px 30px rgba(0, 182, 159, 0.5);
        }

        .nav-button:active {
            transform: scale(0.98);
        }

        .nav-button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        .nav-button:disabled:hover {
            transform: scale(1);
            background: rgba(0, 182, 159, 0.85);
            box-shadow: 0 4px 20px rgba(0, 182, 159, 0.3);
        }

        .slide-counter {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 182, 159, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            z-index: 100;
        }

        .no-slides {
            text-align: center;
            color: #666;
            font-size: 1.2rem;
        }

        .no-slides p {
            margin: 20px 0;
        }

        .add-images-note {
            color: #999;
            font-size: 0.9rem;
            margin-top: 20px;
            max-width: 600px;
        }
    </style>
</head>
<body>
    <a href="Inventory Roadmap.html" class="back-button">← Back to Inventory</a>

    <div class="nav-controls">
        <button class="nav-button prev" id="prevBtn" onclick="previousSlide()">‹</button>
        <button class="nav-button next" id="nextBtn" onclick="nextSlide()">›</button>
    </div>

    <div class="slide-counter">
        <span id="pageNum">1</span> / <span id="pageTotal">0</span>
    </div>

    <div class="container" id="container">
        <div class="no-slides">
            <p>📸 No slides added yet</p>
            <div class="add-images-note">
                <p>Add slide images to the <code>pptx_slides</code> folder as:</p>
                <p><code>slide-1.jpg</code>, <code>slide-2.jpg</code>, etc.</p>
            </div>
        </div>
    </div>

    <script>
        let currentSlide = 0;
        const slides = [
            'pptx_slides/slide-1.jpg',
            'pptx_slides/slide-2.jpg',
            'pptx_slides/slide-3.jpg',
            'pptx_slides/slide-4.jpg',
            'pptx_slides/slide-5.jpg',
            'pptx_slides/slide-6.jpg',
            'pptx_slides/slide-7.jpg',
            'pptx_slides/slide-8.jpg',
            'pptx_slides/slide-9.jpg',
            'pptx_slides/slide-10.jpg',
            'pptx_slides/slide-11.jpg',
            'pptx_slides/slide-12.jpg',
            'pptx_slides/slide-13.jpg',
            'pptx_slides/slide-14.jpg'
        ];
        const container = document.getElementById('container');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        function showSlide(num) {
            if (slides.length === 0) return;

            if (num >= slides.length) currentSlide = slides.length - 1;
            if (num < 0) currentSlide = 0;

            currentSlide = num;

            // Update container with image
            container.innerHTML = `<img src="${slides[currentSlide]}" alt="Slide ${currentSlide + 1}" class="slide-image" onerror="handleImageError()">`;

            // Update counter
            document.getElementById('pageNum').textContent = currentSlide + 1;
            document.getElementById('pageTotal').textContent = slides.length;

            // Update button states
            prevBtn.disabled = currentSlide === 0;
            nextBtn.disabled = currentSlide === slides.length - 1;
        }

        function nextSlide() {
            if (currentSlide < slides.length - 1) {
                showSlide(currentSlide + 1);
            }
        }

        function previousSlide() {
            if (currentSlide > 0) {
                showSlide(currentSlide - 1);
            }
        }

        function handleImageError() {
            console.error('Failed to load slide image at: ' + slides[currentSlide]);
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') previousSlide();
        });

        // Initialize on load
        window.addEventListener('load', () => {
            if (slides.length > 0) {
                showSlide(0);
            }
        });

        // Try to show first slide immediately
        if (slides.length > 0) {
            showSlide(0);
        }
    </script>
</body>
</html>
